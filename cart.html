<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaša korpa – SEKE Rukotvorine</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/shared.css">
<link rel="stylesheet" href="styles/cart.css">
</head>
<body>
<header>
  <a href="index.html" class="brand">
    <div class="brand-logo"><img src="images/logo.png" alt="SEKE rukotvorine logo" width="57px"/></div>
    <div class="brand-text"><h1>SEKE Rukotvorine</h1><p>Ručno rađeno sa ljubavlju</p></div>
  </a>
  <div class="header-actions">
    <button id="a11y-toggle" class="a11y-toggle" type="button" aria-pressed="false">
      <!-- Eye icon: Lucide Icons (ISC License) - https://lucide.dev/icons/eye -->
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye" aria-hidden="true" focusable="false"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
      <span class="a11y-toggle-label" aria-hidden="true">Način za slijepe</span>
      <span class="sr-only">Način za slijepe i slabovidne osobe</span>
    </button>
    <a href="cart.html" class="cart-link" aria-label="Košarica">
      <!-- Shopping-bag icon: Lucide Icons (ISC License) - https://lucide.dev/icons/shopping-bag --><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-shopping-bag-icon lucide-shopping-bag" aria-hidden="true" focusable="false"><path d="M16 10a4 4 0 0 1-8 0"/><path d="M3.103 6.034h17.794"/><path d="M3.4 5.467a2 2 0 0 0-.4 1.2V20a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6.667a2 2 0 0 0-.4-1.2l-2-2.667A2 2 0 0 0 17 2H7a2 2 0 0 0-1.6.8z"/></svg>
      <span id="cart-count">0</span>
    </a>
  </div>
</header>

<div class="page">
  <main>
    <div class="cart-main">
      <h2 class="page-title">Vaša košarica</h2>
      <div id="cart-items"></div>
      <div id="order-summary" class="order-summary" style="display:none">
        <h3>Pregled narudžbe</h3>
        <div id="summary-products"></div>
        <div class="summary-row">
          <span>Subtotal: </span>
          <span id="subtotal-val">€0.00</span>
        </div>
        <div class="summary-row"><span>Dostava</span><span id="shipping-val" class="free">Besplatna</span></div>
        <div class="summary-row total"><span>Ukupno:</span><span class="total-price" id="total-val">€0.00</span></div>
        <!-- <p class="shipping-note" id="shipping-note"></p> -->
        <a href="checkout.html" class="btn-primary">Nastavite ka plaćanju</a>
        <a href="index.html" class="btn-continue">← Nastavite sa kupovinom</a>
      </div>
    </div>
  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="scripts/firebase-config.js"></script>
<script src="scripts/firebase-data.js"></script>
<script src="scripts/shared.js"></script>
<script src="scripts/cart.js"></script>
</body></html>
